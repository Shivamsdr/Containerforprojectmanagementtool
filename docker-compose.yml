version: '3.8'

services:
  mongo:
    image: mongo:latest
    container_name: pm_mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pm_backend
    ports:
      - "5000:5000"
    depends_on:
      - mongo
    environment:
      - PORT=5000
      # Use Local MongoDB
      - MONGO_URI=mongodb://mongo:27017/pm_tool
      - JWT_SECRET=supersecretjwtkey_change_me_in_production_12345
      - FRONTEND_URL=http://localhost:5173,http://localhost:5174,http://localhost
      - EMAIL_USER=your_email@gmail.com
      - EMAIL_PASS=your_email_app_password
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # For local Docker setup, the frontend will call the backend exposed on localhost:5000
        - VITE_API_URL=http://localhost:5000
    container_name: pm_frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  mongo_data:
